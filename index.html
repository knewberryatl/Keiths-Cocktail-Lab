<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Keith's Cocktail Lab</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&display=swap" rel="stylesheet">
<style>
:root {
  --navy:       #1B2A3E;
  --navy-deep:  #0F1C2E;
  --accent:     #5B7FA6;
  --accent-soft:#8BAABF;
  --cream:      #F7F4EF;
  --cream-dark: #EDE9E1;
  --ink:        #1C1F26;
  --mid:        #4A5568;
  --rule:       #C8D4DD;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--cream);color:var(--ink);font-family:'EB Garamond',Georgia,serif;min-height:100vh;}

/* HERO */
.hero{background:var(--navy-deep);padding:52px 24px 40px;text-align:center;position:relative;overflow:hidden;}
.hero::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 50% 0%,rgba(91,127,166,0.18) 0%,transparent 70%);pointer-events:none;}
.hero-eyebrow{font-family:'Cormorant Garamond',serif;font-size:11px;letter-spacing:0.35em;color:var(--accent-soft);text-transform:uppercase;margin-bottom:14px;}
.hero-title{font-family:'Cormorant Garamond',serif;font-size:clamp(42px,10vw,72px);font-weight:300;color:var(--cream);line-height:1;letter-spacing:0.04em;}
.hero-title strong{font-weight:600;color:#fff;}
.hero-rule{display:flex;align-items:center;justify-content:center;gap:12px;margin:18px auto;color:var(--accent);font-size:16px;letter-spacing:0.2em;}
.hero-rule::before,.hero-rule::after{content:'';width:48px;height:1px;background:var(--accent);opacity:0.5;}
.hero-subtitle{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:16px;color:var(--accent-soft);letter-spacing:0.08em;}
.hero-count{margin-top:10px;font-size:13px;color:rgba(139,170,191,0.6);letter-spacing:0.05em;}

/* CONTROLS */
.controls{position:sticky;top:0;z-index:100;background:var(--navy);padding:12px 16px;box-shadow:0 2px 12px rgba(0,0,0,0.25);}
.search-wrap{position:relative;margin-bottom:10px;}
.search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--accent-soft);font-size:15px;pointer-events:none;}
#search{width:100%;padding:10px 12px 10px 36px;background:rgba(255,255,255,0.08);border:1px solid rgba(91,127,166,0.3);border-radius:6px;color:var(--cream);font-family:'EB Garamond',serif;font-size:16px;outline:none;transition:border-color 0.2s,background 0.2s;}
#search::placeholder{color:rgba(247,244,239,0.35);}
#search:focus{border-color:var(--accent);background:rgba(255,255,255,0.12);}
.filters{display:flex;gap:6px;overflow-x:auto;scrollbar-width:none;-webkit-overflow-scrolling:touch;padding-bottom:2px;}
.filters::-webkit-scrollbar{display:none;}
.filter-btn{flex-shrink:0;padding:5px 12px;border-radius:20px;border:1px solid rgba(91,127,166,0.35);background:transparent;color:var(--accent-soft);font-family:'EB Garamond',serif;font-size:13px;letter-spacing:0.04em;cursor:pointer;transition:all 0.18s;white-space:nowrap;}
.filter-btn:hover{border-color:var(--accent);color:var(--cream);}
.filter-btn.active{background:var(--accent);border-color:var(--accent);color:#fff;}

/* SEARCH RESULTS */
.search-results{padding:16px;}
.search-header{font-family:'Cormorant Garamond',serif;font-size:13px;letter-spacing:0.12em;color:var(--accent-soft);text-transform:uppercase;margin-bottom:12px;}
.search-empty{text-align:center;padding:48px 24px;color:var(--mid);font-style:italic;font-size:18px;}

/* SECTIONS */
.sections{padding:8px 0 32px;}
.section{border-bottom:1px solid var(--rule);}
.section-toggle{width:100%;display:flex;align-items:center;justify-content:space-between;padding:16px 16px;background:transparent;border:none;cursor:pointer;text-align:left;transition:background 0.15s;}
.section-toggle:hover{background:rgba(91,127,166,0.06);}
.section-toggle.open{background:rgba(27,42,62,0.04);}
.section-name{font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:600;color:var(--navy);letter-spacing:0.04em;}
.section-meta{display:flex;align-items:center;gap:10px;}
.section-count{font-size:12px;color:var(--accent-soft);letter-spacing:0.06em;}
.section-chevron{color:var(--accent);font-size:13px;transition:transform 0.25s;display:inline-block;}
.section-toggle.open .section-chevron{transform:rotate(180deg);}
.section-body{display:none;padding:0 16px 16px;}
.section-body.open{display:block;}

/* SPIRIT LABEL */
.spirit-label{font-family:'Cormorant Garamond',serif;font-size:11px;letter-spacing:0.28em;color:var(--accent);text-transform:uppercase;text-align:center;padding:14px 0 10px;position:relative;}
.spirit-label::before,.spirit-label::after{content:'';position:absolute;top:50%;width:28%;height:1px;background:var(--rule);}
.spirit-label::before{left:0;}
.spirit-label::after{right:0;}

/* DRINK ITEM */
.drink{padding:10px 0;border-bottom:1px solid rgba(200,212,221,0.4);display:flex;flex-direction:column;gap:3px;transition:background 0.12s;}
.drink:last-child{border-bottom:none;}
.drink-name{font-size:17px;font-weight:600;color:var(--ink);line-height:1.2;}
.drink-desc{font-size:15px;font-style:italic;color:var(--mid);line-height:1.4;}
.drink.highlight .drink-name{color:var(--accent);}

/* MARK */
mark{background:rgba(91,127,166,0.18);color:var(--navy);border-radius:2px;padding:0 1px;}

/* FOOTER */
footer{text-align:center;padding:32px 24px;color:var(--accent-soft);font-size:13px;font-style:italic;letter-spacing:0.05em;border-top:1px solid var(--rule);}

/* Fade in sections */
@keyframes fadeUp{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:none;}}
.section{animation:fadeUp 0.3s ease both;}
.section:nth-child(1){animation-delay:0.02s;}
.section:nth-child(2){animation-delay:0.04s;}
.section:nth-child(3){animation-delay:0.06s;}
.section:nth-child(4){animation-delay:0.08s;}
.section:nth-child(5){animation-delay:0.10s;}
</style>
</head>

// Build flat drink index for search
const allDrinks = [];
SECTIONS.forEach(sec => {
  if (sec.subsections && sec.subsections.length) {
    sec.subsections.forEach(sub => {
      sub.drinks.forEach(d => allDrinks.push({...d, section: sec.name, spirit: sub.spirit}));
    });
  } else {
    sec.drinks.forEach(d => allDrinks.push({...d, section: sec.name, spirit: null}));
  }
});

document.getElementById('totalCount').textContent = allDrinks.length + ' cocktails';

// ── Render full section list ──
function renderSections(spiritFilter) {
  const el = document.getElementById('sectionsEl');
  el.innerHTML = '';
  SECTIONS.forEach((sec, si) => {
    // Filter drinks
    let hasDrinks = false;
    if (sec.subsections && sec.subsections.length) {
      sec.subsections.forEach(sub => {
        if (spiritFilter === 'all' || sub.spirit === spiritFilter) hasDrinks = true;
      });
    } else {
      hasDrinks = true; // non-spirit sections always show unless all filtered away
    }

    // For spirit filter on non-subsection sections, check drink spirits from allDrinks
    if (spiritFilter !== 'all' && (!sec.subsections || !sec.subsections.length)) {
      const secDrinks = allDrinks.filter(d => d.section === sec.name && d.spirit === spiritFilter);
      hasDrinks = secDrinks.length > 0;
    }

    if (!hasDrinks && spiritFilter !== 'all') return;

    const div = document.createElement('div');
    div.className = 'section';
    div.style.animationDelay = (si * 0.02) + 's';

    // Count visible drinks
    let count = 0;
    if (spiritFilter === 'all') {
      count = sec.subsections?.length
        ? sec.subsections.reduce((a,s) => a + s.drinks.length, 0)
        : sec.drinks.length;
    } else {
      if (sec.subsections?.length) {
        sec.subsections.forEach(sub => { if (sub.spirit === spiritFilter) count += sub.drinks.length; });
      } else {
        count = allDrinks.filter(d => d.section === sec.name && d.spirit === spiritFilter).length;
      }
    }

    div.innerHTML = `
      <button class="section-toggle" onclick="toggleSection(this)">
        <span class="section-name">\${sec.name}</span>
        <span class="section-meta">
          <span class="section-count">\${count} drinks</span>
          <span class="section-chevron">&#9660;</span>
        </span>
      </button>
      <div class="section-body">\${buildSectionBody(sec, spiritFilter)}</div>
    `;
    el.appendChild(div);
  });
}

function buildSectionBody(sec, spiritFilter) {
  let html = '';
  const SPIRIT_ORDER = ['Gin','Vodka','Rum','Whiskey / Bourbon','Tequila / Mezcal','Brandy / Cognac','Amaro / Aperitivo','Liqueur','Other'];
  if (sec.subsections && sec.subsections.length) {
    sec.subsections.forEach(sub => {
      if (spiritFilter !== 'all' && sub.spirit !== spiritFilter) return;
      if (spiritFilter === 'all') {
        html += `<div class="spirit-label">\${sub.spirit}</div>`;
      }
      sub.drinks.forEach(d => {
        html += `<div class="drink"><div class="drink-name">\${esc(d.name)}</div>\${d.desc ? `<div class="drink-desc">\${esc(d.desc)}</div>` : ''}</div>`;
      });
    });
  } else {
    let drinks = sec.drinks;
    if (spiritFilter !== 'all') {
      drinks = allDrinks.filter(d => d.section === sec.name && d.spirit === spiritFilter);
    }
    drinks.forEach(d => {
      html += `<div class="drink"><div class="drink-name">\${esc(d.name)}</div>\${d.desc ? `<div class="drink-desc">\${esc(d.desc)}</div>` : ''}</div>`;
    });
  }
  return html;
}

function toggleSection(btn) {
  btn.classList.toggle('open');
  btn.nextElementSibling.classList.toggle('open');
}

function esc(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function highlight(text, q) {
  if (!q) return esc(text);
  const re = new RegExp('(' + q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&') + ')', 'gi');
  return esc(text).replace(re, '<mark>$1</mark>');
}

// ── Search ──
function renderSearch(q, spiritFilter) {
  const res = document.getElementById('searchResults');
  const sec = document.getElementById('sectionsEl');
  if (!q && spiritFilter === 'all') {
    res.style.display = 'none';
    sec.style.display = '';
    return;
  }
  sec.style.display = 'none';
  res.style.display = '';

  let matches = allDrinks;
  if (spiritFilter !== 'all') matches = matches.filter(d => d.spirit === spiritFilter);
  if (q) matches = matches.filter(d => d.name.toLowerCase().includes(q) || (d.desc||'').toLowerCase().includes(q));

  if (!matches.length) {
    res.innerHTML = `<div class="search-header">0 results</div><div class="search-empty">No cocktails found.<br><span style="font-size:14px;opacity:0.6">Try a different search.</span></div>`;
    return;
  }

  let html = `<div class="search-header" style="padding:16px 16px 0">\${matches.length} cocktail\${matches.length!==1?'s':''} found</div>`;
  html += `<div style="padding:0 16px 16px">`;
  matches.forEach(d => {
    html += `<div class="drink highlight">
      <div class="drink-name">\${highlight(d.name, q)}</div>
      \${d.desc ? `<div class="drink-desc">\${highlight(d.desc, q)}</div>` : ''}
      <div style="font-size:12px;color:var(--accent-soft);margin-top:3px;letter-spacing:0.04em">\${esc(d.section)}</div>
    </div>`;
  });
  html += '</div>';
  res.innerHTML = html;
}

// ── Event wiring ──
let currentSpirit = 'all';
let searchTimer;

document.getElementById('search').addEventListener('input', e => {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(() => {
    const q = e.target.value.trim().toLowerCase();
    if (q || currentSpirit !== 'all') {
      renderSearch(q, currentSpirit);
    } else {
      document.getElementById('searchResults').style.display = 'none';
      document.getElementById('sectionsEl').style.display = '';
    }
  }, 180);
});

document.getElementById('filters').addEventListener('click', e => {
  const btn = e.target.closest('.filter-btn');
  if (!btn) return;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentSpirit = btn.dataset.spirit;
  const q = document.getElementById('search').value.trim().toLowerCase();
  if (q || currentSpirit !== 'all') {
    renderSearch(q, currentSpirit);
  } else {
    document.getElementById('searchResults').style.display = 'none';
    document.getElementById('sectionsEl').style.display = '';
    renderSections(currentSpirit);
  }
});

// Init
renderSections('all');
</script>
